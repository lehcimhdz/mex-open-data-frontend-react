server {
    listen       80 default_server;
    listen  [::]:80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy the FastAPI backend so the SPA only talks to one origin.
    location /api/ {
        proxy_pass         ${BACKEND_URL}/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Static assets — long cache, with hashed filenames
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # The SPA — fallback to index.html for client routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
